<html lang="pl">
<head>

    <title>Wiadomość wysłana | M&P Roll</title>
    <meta name="robots" content="noindex, follow">
    <style>
        /* latin-ext */
        @font-face {
          font-family: 'Outfit';
          font-style: normal;
          font-weight: 100 900;
          font-display: swap;
          src: url('/assets/fonts/outfit-latinext.woff2') format('woff2');
          unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
        }
        /* latin */
        @font-face {
          font-family: 'Outfit';
          font-style: normal;
          font-weight: 100 900;
          font-display: swap;
          src: url('/assets/fonts/outfit-latin.woff2') format('woff2');
          unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }
        @font-face {font-family: 'Outfit Fallback';font-style: normal;font-weight: 100 900;src: local('Arial');ascent-override: 98%;descent-override: 24%;line-gap-override: 0%;size-adjust: 102.5%;}
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Outfit Fallback', sans-serif;
            background-color: #f8fbff;
        }
        .success-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .success-card {
            background-color: #ffffff;
            padding: 4rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,30,80,0.06);
            max-width: 500px;
            width: 90%;
            margin: 0 auto;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #0056b3;
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        .success-icon svg { width: 40px; height: 40px; }
        .success-card h1 { 
            margin-bottom: 1rem; 
            color: #111111;
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0;
        }
        .success-card p { 
            margin-bottom: 2.5rem; 
            color: #555555;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .btn-primary {
            display: inline-block;
            background-color: #0056b3;
            color: #ffffff;
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #003d82;
            transform: translateY(-2px);
        }
        .footer-link {
            color: #555555;
            text-decoration: underline;
            text-underline-offset: 3px;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        .footer-link:hover {
            color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h1>Dziękujemy!</h1>
            <p>Twoja wiadomość została pomyślnie wysłana. Skontaktujemy się z Tobą najszybciej jak to możliwe.</p>
            <a href="/" class="btn-primary">Wróć na stronę główną</a>
            <div style="margin-top: 1.5rem;"><a href="/polityka-prywatnosci.html" class="footer-link">Polityka Prywatności</a></div>
        </div>
    </div>
</body>
</html>
